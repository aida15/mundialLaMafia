name: Actualizar resultados Mundial 2026

on:
  schedule:
    # Cada hora en punto (UTC). Ajusta si quieres más o menos frecuencia.
    - cron: '0 * * * *'
  # Permite lanzarlo manualmente desde la pestaña Actions de GitHub
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repo
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Ejecutar script de actualización
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
        run: node update-results.js

      - name: Commit y push si hay cambios
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results.js
          # Solo hace commit si results.js ha cambiado
          if git diff --cached --quiet; then
            echo "Sin cambios en results.js — nada que publicar."
          else
            git commit -m "🤖 Resultados actualizados $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
